name: tactile_text
description: |-
  TactileText: An affordable digital braille solution empowering visually impaired 
  individuals through real-time braille display and intelligent content conversion 
  using Azure Cognitive Services. Combines custom hardware (6 electromagnetic actuators 
  controlled via Arduino) with a Flutter-based mobile app for cross-platform accessibility.
  
  Cost-effective alternative to expensive digital braille displays (under $20 USD vs thousands).
  Features multi-modal input: keyboard, OCR (printed text), and speech-to-text conversion.
  Supports digital text to braille/speech, printed text to braille/speech, and speech to braille/speech.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.1.0 <3.0.0"

dependencies:
  http:
  path:
  toggle_switch: "^0.1.8"
  flutter_bluetooth_serial: ^0.2.2
  json_annotation: 
  image_picker: ^0.6.3+4
  path_provider:
  dio:
  tts_azure:
  flutter_audio_recorder:
  provider:
  hive:
  hive_flutter:
  file_picker :
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^0.1.2

dev_dependencies:
  build_runner: 
  
  flutter_test:
    sdk: flutter


